# Пример nginx для основного сайта qlin.pro (Docker: frontend 3000, backend 8000).
# Сайт в браузере ходит в API по тому же домену: https://qlin.pro/api/v1/...
# Без блока /api/ страницы откроются, но авторизация и заказы не заработают.

server {
    listen 80;
    server_name qlin.pro www.qlin.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name qlin.pro www.qlin.pro;

    ssl_certificate     /etc/letsencrypt/live/qlin.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qlin.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;

    # Health бэкенда (корень приложения, не под /api/v1)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Бэкенд FastAPI: префикс приложения /api/v1
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CORS preflight
        proxy_set_header Access-Control-Request-Method $http_access_control_request_method;
        proxy_set_header Access-Control-Request-Headers $http_access_control_request_headers;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 10M;
}
