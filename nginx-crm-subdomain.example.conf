# Пример для VPS: поддомен CRM (Docker qlin_crm → порт 3002 на хосте).
# CRM ходит в API на основной домен: https://qlin.pro/api/v1 — там нужен nginx с location /api/
# (см. nginx-qlin-main.example.conf) и актуальный CORS на бэкенде для https://crm.qlin.pro.
# 1) В панели DNS у домена qlin.pro добавьте A-запись: crm → IP сервера.
# 2) Скопируйте блоки в sites-enabled или подключите include.
# 3) SSL: certbot certonly --nginx -d crm.qlin.pro   (или --webroot)
# 4) Подставьте пути к сертификатам Let's Encrypt.

server {
    listen 80;
    server_name crm.qlin.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.qlin.pro;

    ssl_certificate     /etc/letsencrypt/live/crm.qlin.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.qlin.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;

    # Важно: порт CRM из docker-compose.prod.yml (3002:3000), не порт основного сайта (3000).
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 10M;
}
